{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}mcpmu{{end}}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/sse.js"></script>
</head>
<body>
<div class="shell">

  <header class="topbar">
    <div class="topbar-logo">mcpmu <span>web</span></div>
    <nav>
      <ul class="topbar-nav">
        <li><a href="/servers"{{if eq .Page "servers"}} class="active"{{end}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="5" rx="1"/><rect x="2" y="9" width="12" height="5" rx="1"/><circle cx="5" cy="4.5" r="0.75" fill="currentColor" stroke="none"/><circle cx="5" cy="11.5" r="0.75" fill="currentColor" stroke="none"/></svg>
          Servers
        </a></li>
        <li><a href="/namespaces"{{if eq .Page "namespaces"}} class="active"{{end}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/><rect x="4" y="2" width="3" height="4" rx="0.5"/><rect x="8" y="6" width="3" height="4" rx="0.5"/><rect x="5" y="10" width="3" height="4" rx="0.5"/></svg>
          Namespaces
        </a></li>
      </ul>
    </nav>
    <div class="topbar-right">
      <span class="text-xs text-faint">config: {{.ConfigPath}}</span>
    </div>
  </header>

  <main class="main">
    {{block "content" .}}{{end}}
  </main>

</div>
</body>
</html>
{{end}}
