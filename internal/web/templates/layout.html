{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}mcpmu{{end}}</title>
  <link rel="icon" type="image/png" href="/static/mcp-icon-dark.png">
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/sse.js"></script>
  <script>
  (function() {
    var pendingByRootId = new Map();

    function rootId(root) {
      return root && root.id ? root.id : "";
    }

    function cssEscape(value) {
      if (window.CSS && typeof window.CSS.escape === "function") {
        return window.CSS.escape(value);
      }
      return value.replace(/["\\]/g, "\\$&");
    }

    document.addEventListener("htmx:beforeRequest", function(evt) {
      var elt = evt.detail && evt.detail.elt;
      if (!elt) {
        return;
      }

      var root = elt.closest("[data-preserve-scroll]");
      if (!root) {
        return;
      }

      var id = rootId(root);
      if (!id) {
        return;
      }

      var anchor = elt.closest("[data-scroll-key]");
      pendingByRootId.set(id, {
        anchorKey: anchor ? anchor.getAttribute("data-scroll-key") : "",
        anchorTop: anchor ? anchor.getBoundingClientRect().top : 0,
        rootHeight: root.offsetHeight,
        scrollY: window.scrollY,
      });
    });

    document.addEventListener("htmx:beforeSwap", function(evt) {
      var target = evt.detail && evt.detail.target;
      if (!target || !target.hasAttribute("data-preserve-scroll")) {
        return;
      }

      var id = rootId(target);
      var pending = pendingByRootId.get(id);
      if (!pending) {
        return;
      }

      target.style.minHeight = pending.rootHeight + "px";
    });

    document.addEventListener("htmx:afterSettle", function(evt) {
      var elt = evt.detail && evt.detail.elt;
      var root = elt && elt.closest ? elt.closest("[data-preserve-scroll]") : null;
      if (!root) {
        return;
      }

      var id = rootId(root);
      var pending = pendingByRootId.get(id);
      if (!pending) {
        return;
      }

      root.style.minHeight = "";

      requestAnimationFrame(function() {
        if (pending.anchorKey) {
          var selector = '[data-scroll-key="' + cssEscape(pending.anchorKey) + '"]';
          var anchor = root.querySelector(selector);
          if (anchor) {
            window.scrollBy(0, anchor.getBoundingClientRect().top - pending.anchorTop);
          } else {
            window.scrollTo(0, pending.scrollY);
          }
        } else {
          window.scrollTo(0, pending.scrollY);
        }
        pendingByRootId.delete(id);
      });
    });
  })();

  // Config file watcher: reload page when external changes are detected.
  // Skip form pages so unsaved user input is not lost.
  (function() {
    if (/\/(add|edit|import)/.test(location.pathname)) return;

    var src = new EventSource('/events/config');
    src.addEventListener('config-changed', function() {
      location.reload();
    });
    window.addEventListener('beforeunload', function() {
      src.close();
    });
  })();
  </script>
</head>
<body>
<div class="shell">

  <header class="topbar">
    <div class="topbar-logo">
      <img src="/static/mcp-icon-dark.png" alt="" class="topbar-icon topbar-icon-dark">
      <img src="/static/mcp-icon-light.png" alt="" class="topbar-icon topbar-icon-light">
      mcpmu <span>web</span>
    </div>
    <nav>
      <ul class="topbar-nav">
        <li><a href="/servers"{{if eq .Page "servers"}} class="active"{{end}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="5" rx="1"/><rect x="2" y="9" width="12" height="5" rx="1"/><circle cx="5" cy="4.5" r="0.75" fill="currentColor" stroke="none"/><circle cx="5" cy="11.5" r="0.75" fill="currentColor" stroke="none"/></svg>
          Servers
        </a></li>
        <li><a href="/namespaces"{{if eq .Page "namespaces"}} class="active"{{end}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/><rect x="4" y="2" width="3" height="4" rx="0.5"/><rect x="8" y="6" width="3" height="4" rx="0.5"/><rect x="5" y="10" width="3" height="4" rx="0.5"/></svg>
          Namespaces
        </a></li>
        <li><a href="/registry"{{if eq .Page "registry"}} class="active"{{end}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
          Registry
        </a></li>
      </ul>
    </nav>
    <div class="topbar-right">
      <span class="text-xs text-faint">config: {{.ConfigPath}}</span>
      <a href="/api/config/export" class="btn btn-sm" title="Export config" download>Export</a>
      <a href="/config/import" class="btn btn-sm" title="Import config">Import</a>
      {{if authEnabled}}<form method="POST" action="/logout" style="display:inline"><button type="submit" class="btn btn-sm" title="Sign out">Logout</button></form>{{end}}
    </div>
  </header>

  <main class="main">
    {{block "content" .}}{{end}}
  </main>

</div>
</body>
</html>
{{end}}
